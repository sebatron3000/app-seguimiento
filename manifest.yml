permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - storage:app
    - read:jira-user
  external:
    fetch:
      backend:
        - address: https://api.telegram.org

modules:
  jira:globalPage:
    - key: telegram-sync-page-v2
      resource: main-ui
      render: native
      resolver:
        function: render-page-fn
      title: Telegram Sync
  trigger:
    - key: issue-assigned-trigger
      function: handleIssueAssigned
      events:
        - avi:jira:assigned:issue
  webtrigger:
    - key: telegram-webhook
      function: handleTelegramCallback
  function:
    - key: render-page-fn
      handler: index.pageResolver
    - key: handleIssueAssigned
      handler: index.runTrigger
    - key: handleTelegramCallback
      handler: index.runWebtrigger

resources:
  - key: main-ui
    path: src/frontend/index.jsx

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/8ece6349-2e6c-4f68-a9e9-ae7e22817de6